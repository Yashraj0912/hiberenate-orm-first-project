name : Java CI and update on docker image

on :
  push:
    branches:
      - main
jobs :
  build :
    runs-on: ubuntu-latest
    steps:
      - name : check out the repository
        uses: actions/checkout@v4
      - name : java set up for the testing and compiling
        uses: actions/setup-java@v4
        with :
          distribution: temurin
          java-version: '21'
      - name : building the jar file
        run: mvn clean package

      - name : loging in into docker
        uses : docker/login-action@v3
        with:
          username : ${{secret.DOCKERHUB_USERNAME}}
          password : ${{secret.DOCKERHUB_PASSWORD}}

      - name: Build Docker Image
        run: |
          docker build -t ${{secrets.DOCKERHUB_USERNAME}}/hibernate-crud-app:${{github.run_number}} .
          docker tag ${{secrets.DOCKERHUB_USERNAME}}/hibernate-crud-app:${{github.run_number}} \
                     ${{secrets.DOCKERHUB_USERNAME}}/hibernate-crud-app:latest

      - name: Push Docker Images
        run: |
          docker push ${{secrets.DOCKERHUB_USERNAME}}/hibernate-crud-app:${{github.run_number}}
          docker push ${{secrets.DOCKERHUB_USERNAME}}/hibernate-crud-app:latest
